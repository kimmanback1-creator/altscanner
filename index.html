<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ALTSCANNER</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --bg:       #141414;
  --bg2:      #1a1a1a;
  --bg3:      #181818;
  --border:   #222;
  --border2:  #1e1e1e;
  --text:     #e0e0e0;
  --text2:    #888;
  --text3:    #444;
  --text4:    #2a2a2a;
  --green:    #2ecc71;
  --red:      #e74c3c;
  --blue:     #5b9bd5;
  --purple:   #9b7fd5;
  --yellow:   #f0b90b;
  --orange:   #d5a55b;
}
body { background: var(--bg); color: var(--text); font-family: 'Consolas', monospace; font-size: 13px; }

/* 탑바 */
.topbar { display: flex; align-items: center; justify-content: space-between; padding: 10px 16px; background: var(--bg2); border-bottom: 0.5px solid #2a2a2a; }
.logo { font-size: 14px; font-weight: 500; color: #fff; letter-spacing: 0.5px; }
.topbar-right { display: flex; align-items: center; gap: 8px; }
.status-dot { width: 7px; height: 7px; border-radius: 50%; background: var(--green); display: inline-block; animation: pulse 2s infinite; }
@keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.4} }
.badge { font-size: 11px; padding: 3px 8px; border-radius: 4px; border: 0.5px solid #2a2a2a; color: var(--text2); background: #1f1f1f; }
.badge.on { color: var(--green); border-color: #1a3a2a; background: #0f2a1a; }
.last-update { font-size: 10px; color: var(--text4); }

/* 컨테이너 패널 */
.containers { display: grid; grid-template-columns: 1fr 1fr; border-bottom: 0.5px solid #2a2a2a; }
.container-panel { padding: 10px 14px; }
.long-panel  { background: #0d1a10; border-right: 0.5px solid #2a2a2a; }
.short-panel { background: #1a0d0d; }
.container-title { font-size: 11px; font-weight: 500; margin-bottom: 8px; display: flex; align-items: center; justify-content: space-between; }
.long-panel  .container-title { color: var(--green); }
.short-panel .container-title { color: var(--red); }
.sig-count { font-size: 12px; font-weight: 500; padding: 2px 8px; border-radius: 10px; }
.long-cnt  { background: #0d2a14; color: var(--green); border: 0.5px solid #1a4a2a; }
.short-cnt { background: #2a0d0d; color: var(--red);   border: 0.5px solid #4a1a1a; }
.slider-row { display: flex; align-items: center; gap: 8px; margin-bottom: 5px; }
.slider-label { font-size: 10px; width: 28px; }
.long-panel  .slider-label { color: #2a6a3a; }
.short-panel .slider-label { color: #6a2a2a; }
.slider-wrap { flex: 1; }
.slider-wrap input[type=range] { width: 100%; accent-color: #444; }
.slider-val { font-size: 11px; font-weight: 500; min-width: 32px; text-align: right; }
.long-panel  .slider-val { color: var(--green); }
.short-panel .slider-val { color: var(--red); }

/* 정렬 바 */
.sort-bar { display: grid; grid-template-columns: 1fr 1fr; border-bottom: 0.5px solid var(--border); }
.sort-section { display: flex; align-items: center; gap: 4px; padding: 6px 14px; }
.sort-section:first-child { border-right: 0.5px solid var(--border); }
.sort-label { font-size: 10px; color: var(--text4); margin-right: 2px; }
.sb { font-size: 10px; padding: 3px 8px; border: none; border-left: 2px solid transparent; border-radius: 0; background: transparent; color: var(--text4); cursor: pointer; font-family: inherit; }
.sb:hover { color: var(--text3); }
.sb.active { border-left-color: var(--blue); color: #a8d0f0; }

/* 메인 분할 */
.main-split { display: grid; grid-template-columns: 1fr 1fr; }
.table-pane { display: flex; flex-direction: column; }
.long-pane  { border-right: 0.5px solid var(--border); }
.pane-header { padding: 6px 14px; background: var(--bg3); border-bottom: 0.5px solid var(--border2); display: flex; align-items: center; }
.pane-title { font-size: 10px; font-weight: 500; }
.long-pane  .pane-title { color: var(--green); }
.short-pane .pane-title { color: var(--red); }
.pane-dia-btn { font-size: 10px; padding: 2px 7px; border-radius: 3px; border: 1px solid var(--border); background: var(--bg); color: var(--text4); cursor: pointer; margin-left: auto; font-family: inherit; }
.pane-dia-btn.active { border-color: var(--yellow); color: var(--yellow); background: #1a1808; }
.table-scroll { overflow-y: auto; max-height: 320px; }

table { width: 100%; border-collapse: collapse; table-layout: fixed; }
thead { position: sticky; top: 0; z-index: 10; background: var(--bg2); }
th { padding: 6px 8px; text-align: left; font-size: 10px; color: var(--text4); font-weight: 400; border-bottom: 0.5px solid var(--border2); white-space: nowrap; }
th.r { text-align: right; }
th.c { text-align: center; }
td { padding: 5px 8px; font-size: 11px; border-bottom: 0.5px solid #181818; vertical-align: middle; }
td.r { text-align: right; }
td.c { text-align: center; }
tr { cursor: pointer; transition: background 0.1s; }
tr:hover td { background: #1c1c1c; }
tr.selected td { background: #1a2030; }
tr.sig td { color: #aaa; }
tr.sig .ticker-name { color: #ddd; }
tr.long-sig { border-left: 2px solid var(--green); }
tr.short-sig { border-left: 2px solid var(--red); }
tr.dim { opacity: 0.22; }

.ticker-name { font-size: 11px; font-weight: 500; color: var(--text3); }
.ex-tag { font-size: 9px; padding: 1px 4px; border-radius: 2px; margin-left: 3px; }
.ex-bnc { background: #1a1a08; color: #8a7010; border: 0.5px solid #2a2a10; }
.ex-okx { background: #1e1e1e; color: #555;    border: 0.5px solid #2a2a2a; }
.ex-byb { background: #0a1020; color: #7a6010; border: 0.5px solid #1a2030; }
tr.sig .ex-bnc { color: var(--yellow); }
tr.sig .ex-okx { color: #aaa; }
tr.sig .ex-byb { color: #f7a600; }

/* 듀얼 바 */
.dual-bar { display: flex; align-items: center; gap: 3px; justify-content: center; }
.dual-track { width: 50px; height: 4px; background: #1a1a1a; border-radius: 2px; position: relative; overflow: hidden; }
.dual-center { position: absolute; left: 50%; top: 0; width: 0.5px; height: 100%; background: #252525; }
.dual-fill { position: absolute; top: 0; height: 100%; }
.df-pos      { left:  50%; background: #1a3a1a; border-radius: 0 2px 2px 0; }
.df-neg      { right: 50%; background: #3a1a1a; border-radius: 2px 0 0 2px; }
.df-vol      { left:  50%; background: #2a2510; border-radius: 0 2px 2px 0; }
.df-pos.over { background: var(--green); }
.df-neg.over { background: var(--red); }
.df-vol.over { background: var(--orange); }
.dual-num { font-size: 10px; min-width: 28px; text-align: right; color: var(--text4); }
.dn-pos-over { color: var(--green);  font-weight: 500; }
.dn-neg-over { color: var(--red);    font-weight: 500; }
.dn-vol-over { color: var(--orange); font-weight: 500; }

/* 다이아 */
.dia-cell { display: flex; flex-direction: column; align-items: center; gap: 1px; }
.dia-icon { font-size: 11px; line-height: 1; }
.dia-up   { color: var(--green); }
.dia-down { color: var(--red); }
.dia-none { color: #1e1e1e; }
.dia-time { font-size: 9px; }
.dia-fresh  { color: var(--yellow); }
.dia-recent { color: var(--text3); }
.dia-old    { color: var(--text4); }

/* 진단 */
.diag { font-size: 9px; padding: 1px 5px; border-radius: 3px; white-space: nowrap; display: inline-block; }
.dg-healthy-up { background: #0a1f0a; color: var(--green);  border: 0.5px solid #1a3a1a; }
.dg-squeeze    { background: #0a1520; color: var(--blue);   border: 0.5px solid #1a2a3a; }
.dg-div-bear   { background: #1f1f0a; color: var(--yellow); border: 0.5px solid #3a3a1a; }
.dg-div-bull   { background: #1a0a1f; color: var(--purple); border: 0.5px solid #2a1a3a; }
.dg-healthy-dn { background: #1f0a0a; color: var(--red);    border: 0.5px solid #3a1a1a; }
.dg-exhaust    { background: #1a1210; color: var(--orange); border: 0.5px solid #3a2a1a; }
.dg-accum      { background: #0a1a1f; color: #5bd5c8;       border: 0.5px solid #1a3a3a; }
.dg-weak       { background: #181818; color: var(--text3);  border: 0.5px solid var(--border); }

.score-pill { font-size: 10px; font-weight: 500; padding: 1px 5px; border-radius: 6px; display: inline-block; }
.sp-hi { background: #0f2a1a; color: var(--green);  border: 0.5px solid #1a4a2a; }
.sp-md { background: #1a1a08; color: var(--yellow); border: 0.5px solid #2a2a10; }
.sp-lo { background: #161616; color: var(--text3);  border: 0.5px solid var(--border2); }

/* 상세 패널 */
.detail-section { border-top: 0.5px solid var(--border); background: var(--bg3); }
.detail-inner { display: flex; min-height: 200px; }
.detail-info { width: 200px; padding: 12px 14px; border-right: 0.5px solid var(--border2); flex-shrink: 0; overflow-y: auto; }
.detail-title { font-size: 14px; font-weight: 500; color: #fff; }
.detail-sub { font-size: 10px; color: var(--text3); margin-bottom: 6px; }
.detail-score { font-size: 28px; font-weight: 500; line-height: 1; margin: 4px 0 1px; }
.detail-score-label { font-size: 10px; color: var(--text4); margin-bottom: 6px; }
.drow { display: flex; justify-content: space-between; align-items: center; padding: 3px 0; border-bottom: 0.5px solid #1a1a1a; }
.drow:last-child { border-bottom: none; }
.dlabel { font-size: 11px; color: var(--text4); }
.diag-detail { margin-top: 7px; padding: 6px 8px; border-radius: 4px; font-size: 10px; }
.dia-detail-box { margin-top: 5px; padding: 6px 8px; border-radius: 4px; }
.dia-detail-box.up   { background: #0a1a0a; border: 0.5px solid #1a3a1a; }
.dia-detail-box.down { background: #1a0a0a; border: 0.5px solid #3a1a1a; }
.charts-area { flex: 1; display: flex; }
.chart-col { flex: 1; border-right: 0.5px solid #1a1a1a; padding: 10px 12px; display: flex; flex-direction: column; }
.chart-col:last-child { border-right: none; }
.chart-top { display: flex; justify-content: space-between; margin-bottom: 6px; }
.chart-name { font-size: 10px; }
.chart-val  { font-size: 11px; font-weight: 500; }
.spark { flex: 1; width: 100%; }
.empty-detail { display: flex; align-items: center; justify-content: center; height: 200px; color: var(--text4); font-size: 12px; }

/* 워밍업 배너 */
.warming { background: #1a1a08; border-bottom: 0.5px solid #3a3a10; padding: 6px 16px; font-size: 11px; color: var(--yellow); display: none; }
</style>
</head>
<body>

<div class="topbar">
  <div style="display:flex;align-items:center;gap:10px">
    <span class="logo">ALTSCANNER</span>
    <span class="status-dot" id="status-dot"></span>
    <span style="font-size:11px;color:#444" id="status-text">연결 중...</span>
  </div>
  <div class="topbar-right">
    <span class="badge on" id="badge-bnc">BNC —</span>
    <span class="badge on" id="badge-okx">OKX —</span>
    <span class="badge on" id="badge-byb">BYB —</span>
    <span class="badge">15분봉</span>
    <span class="last-update" id="last-update"></span>
  </div>
</div>

<div class="warming" id="warming-banner">
  ⚡ 워밍업 중 — 데이터 축적까지 약 20~30분 소요됩니다. 그 전까지는 신호가 제한될 수 있어요.
</div>

<!-- 상승/하락 컨테이너 -->
<div class="containers">
  <div class="container-panel long-panel">
    <div class="container-title">
      <span>▲ 상승 신호 기준</span>
      <span class="sig-count long-cnt" id="long-cnt">0개</span>
    </div>
    <div class="slider-row">
      <span class="slider-label">CVD</span>
      <div class="slider-wrap"><input type="range" min="0" max="100" step="5" value="60" oninput="setLP('cvd',this.value)"></div>
      <span class="slider-val" id="lp-cvd">60%</span>
    </div>
    <div class="slider-row">
      <span class="slider-label">OI</span>
      <div class="slider-wrap"><input type="range" min="0" max="100" step="5" value="50" oninput="setLP('oi',this.value)"></div>
      <span class="slider-val" id="lp-oi">50%</span>
    </div>
    <div class="slider-row">
      <span class="slider-label">VOL</span>
      <div class="slider-wrap"><input type="range" min="0" max="100" step="5" value="70" oninput="setLP('vol',this.value)"></div>
      <span class="slider-val" id="lp-vol">70%</span>
    </div>
  </div>
  <div class="container-panel short-panel">
    <div class="container-title">
      <span>▼ 하락 신호 기준</span>
      <span class="sig-count short-cnt" id="short-cnt">0개</span>
    </div>
    <div class="slider-row">
      <span class="slider-label">CVD</span>
      <div class="slider-wrap"><input type="range" min="0" max="100" step="5" value="60" oninput="setSP('cvd',this.value)"></div>
      <span class="slider-val" id="sp-cvd">60%</span>
    </div>
    <div class="slider-row">
      <span class="slider-label">OI</span>
      <div class="slider-wrap"><input type="range" min="0" max="100" step="5" value="50" oninput="setSP('oi',this.value)"></div>
      <span class="slider-val" id="sp-oi">50%</span>
    </div>
    <div class="slider-row">
      <span class="slider-label">VOL</span>
      <div class="slider-wrap"><input type="range" min="0" max="100" step="5" value="70" oninput="setSP('vol',this.value)"></div>
      <span class="slider-val" id="sp-vol">70%</span>
    </div>
  </div>
</div>

<!-- 정렬 바 -->
<div class="sort-bar">
  <div class="sort-section">
    <span class="sort-label">정렬</span>
    <button class="sb active" id="ls-score" onclick="setSort('long','score')">종합</button>
    <button class="sb" id="ls-cvd"   onclick="setSort('long','cvd')">CVD</button>
    <button class="sb" id="ls-vol"   onclick="setSort('long','vol')">거래량</button>
    <button class="sb" id="ls-dia"   onclick="setSort('long','dia')">다이아</button>
  </div>
  <div class="sort-section">
    <span class="sort-label">정렬</span>
    <button class="sb active" id="ss-score" onclick="setSort('short','score')">종합</button>
    <button class="sb" id="ss-cvd"   onclick="setSort('short','cvd')">CVD</button>
    <button class="sb" id="ss-vol"   onclick="setSort('short','vol')">거래량</button>
    <button class="sb" id="ss-dia"   onclick="setSort('short','dia')">다이아</button>
  </div>
</div>

<!-- 분할 테이블 -->
<div class="main-split">
  <div class="table-pane long-pane">
    <div class="pane-header">
      <span class="pane-title">▲ LONG</span>
      <button class="pane-dia-btn" id="ldiatog" onclick="toggleDia('long')">◆ 다이아만</button>
    </div>
    <div class="table-scroll">
      <table>
        <thead><tr>
          <th style="width:105px">티커</th>
          <th style="width:78px" class="c">CVD</th>
          <th style="width:78px" class="c">OI</th>
          <th style="width:78px" class="c">거래량</th>
          <th style="width:48px" class="r">종합</th>
          <th style="width:60px" class="c">다이아</th>
          <th>상태 진단</th>
        </tr></thead>
        <tbody id="long-tbody"></tbody>
      </table>
    </div>
  </div>
  <div class="table-pane short-pane">
    <div class="pane-header">
      <span class="pane-title">▼ SHORT</span>
      <button class="pane-dia-btn" id="sdiatog" onclick="toggleDia('short')">◆ 다이아만</button>
    </div>
    <div class="table-scroll">
      <table>
        <thead><tr>
          <th style="width:105px">티커</th>
          <th style="width:78px" class="c">CVD</th>
          <th style="width:78px" class="c">OI</th>
          <th style="width:78px" class="c">거래량</th>
          <th style="width:48px" class="r">종합</th>
          <th style="width:60px" class="c">다이아</th>
          <th>상태 진단</th>
        </tr></thead>
        <tbody id="short-tbody"></tbody>
      </table>
    </div>
  </div>
</div>

<!-- 상세 패널 -->
<div class="detail-section">
  <div id="detail-panel">
    <div class="empty-detail">티커를 클릭하면 상세 정보가 표시됩니다</div>
  </div>
</div>

<script>
// ── Supabase 설정 ─────────────────────────
const SUPABASE_URL = 'https://qjhqilkjckqpjlojppgq.supabase.co'   // ← 실제 URL로 교체
const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InFqaHFpbGtqY2txcGpsb2pwcGdxIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzcwNTkwNzEsImV4cCI6MjA5MjYzNTA3MX0.AgjvFhkvjvPLRi282m1lQ-mL5-2Yzpq88aQNb8hMxG4'   // ← 실제 KEY로 교체
const { createClient } = supabase
const sb = createClient(SUPABASE_URL, SUPABASE_KEY)

// ── 상태 ──────────────────────────────────
let LP = { cvd:60, oi:50, vol:70 }
let SP = { cvd:60, oi:50, vol:70 }
let lSort='score', sSort='score'
let lDiaOnly=false, sDiaOnly=false
let selKey=null
let allData = []      // 최신 15분봉 데이터
let diamonds = {}     // 활성 다이아 { SOLUSDT: {direction, received_at, price} }

// 로컬스토리지에서 슬라이더 복원
function loadParams() {
  try {
    const saved = JSON.parse(localStorage.getItem('altscanner_params') || '{}')
    if(saved.LP) LP = saved.LP
    if(saved.SP) SP = saved.SP
    // 슬라이더 UI 복원
    document.querySelector('.long-panel input:nth-of-type(1)').value = LP.cvd
    document.querySelector('.long-panel input:nth-of-type(2)').value = LP.oi
    document.querySelector('.long-panel input:nth-of-type(3)').value = LP.vol
    document.querySelector('.short-panel input:nth-of-type(1)').value = SP.cvd
    document.querySelector('.short-panel input:nth-of-type(2)').value = SP.oi
    document.querySelector('.short-panel input:nth-of-type(3)').value = SP.vol
    document.getElementById('lp-cvd').textContent = LP.cvd+'%'
    document.getElementById('lp-oi').textContent  = LP.oi+'%'
    document.getElementById('lp-vol').textContent = LP.vol+'%'
    document.getElementById('sp-cvd').textContent = SP.cvd+'%'
    document.getElementById('sp-oi').textContent  = SP.oi+'%'
    document.getElementById('sp-vol').textContent = SP.vol+'%'
  } catch(e) {}
}

function saveParams() {
  localStorage.setItem('altscanner_params', JSON.stringify({ LP, SP }))
}

// ── 데이터 로딩 ───────────────────────────
async function loadLatestCandles() {
  // 각 심볼+거래소의 가장 최근 1개씩
  const { data, error } = await sb
    .from('candle_data')
    .select('*')
    .order('ts', { ascending: false })
    .limit(1000)

  if(error) { console.error('candle load error:', error); return; }

  // 심볼+거래소 기준 최신 1개만
  const latest = {}
  for(const row of data) {
    const key = row.exchange + ':' + row.symbol
    if(!latest[key]) latest[key] = row
  }
  allData = Object.values(latest)

  updateBadges()
  render()
}

async function loadDiamonds() {
  const { data, error } = await sb
    .from('diamond_signals')
    .select('*')
    .eq('is_active', true)

  if(error) { console.error('diamond load error:', error); return; }

  diamonds = {}
  for(const row of data) {
    diamonds[row.symbol] = {
      direction:   row.direction,
      received_at: row.received_at,
      price:       row.price,
    }
  }
  render()
}

function updateBadges() {
  const bnc = allData.filter(r=>r.exchange==='binance').length
  const okx = allData.filter(r=>r.exchange==='okx').length
  const byb = allData.filter(r=>r.exchange==='bybit').length
  document.getElementById('badge-bnc').textContent = `BNC ${bnc}`
  document.getElementById('badge-okx').textContent = `OKX ${okx}`
  document.getElementById('badge-byb').textContent = `BYB ${byb}`
  document.getElementById('last-update').textContent =
    '업데이트: ' + new Date().toLocaleTimeString('ko-KR')
  document.getElementById('status-text').textContent = '실시간 수집 중'
}

// ── Realtime 구독 ─────────────────────────
function subscribeRealtime() {
  sb.channel('candle_data')
    .on('postgres_changes', {
      event:  'INSERT',
      schema: 'public',
      table:  'candle_data'
    }, payload => {
      const row = payload.new
      const key = row.exchange + ':' + row.symbol
      // 기존 같은 키 제거 후 추가
      allData = allData.filter(r => !(r.exchange===row.exchange && r.symbol===row.symbol))
      allData.push(row)
      updateBadges()
      render()
    })
    .subscribe()

  sb.channel('diamond_signals')
    .on('postgres_changes', {
      event:  '*',
      schema: 'public',
      table:  'diamond_signals'
    }, () => {
      loadDiamonds()
    })
    .subscribe()
}

// ── 신호 판정 ─────────────────────────────
function isLongSig(r) {
  return r.cvd_pct >= LP.cvd && r.oi_pct >= LP.oi && r.vol_pct >= LP.vol
}
function isShortSig(r) {
  return r.cvd_pct <= -SP.cvd && r.oi_pct <= -SP.oi && r.vol_pct >= SP.vol
}

// ── 유틸 ──────────────────────────────────
function timeAgo(ts) {
  if(!ts) return null
  const diff = (Date.now() - new Date(ts).getTime()) / 3600000
  if(diff < 1)  return Math.round(diff*60)+'분'
  if(diff < 24) return diff.toFixed(1)+'H'
  return Math.floor(diff/24)+'일'
}
function timeClass(ts) {
  if(!ts) return ''
  const diff = (Date.now() - new Date(ts).getTime()) / 3600000
  return diff<4 ? 'dia-fresh' : diff<12 ? 'dia-recent' : 'dia-old'
}
function exTag(ex) {
  const map = { binance:'BNC', okx:'OKX', bybit:'BYB' }
  const cls = ex==='binance'?'ex-bnc':ex==='okx'?'ex-okx':'ex-byb'
  return `<span class="ex-tag ${cls}">${map[ex]||ex}</span>`
}
function dualBar(val, thr) {
  const abs=Math.abs(val), half=Math.min(abs/2, 50)
  const isPos=val>=0, over=abs>=thr
  const fc = (isPos?'df-pos':'df-neg') + (over?' over':'')
  const nc = isPos ? (over?'dn-pos-over':'') : (over?'dn-neg-over':'')
  return `<div class="dual-bar">
    <div class="dual-track"><div class="dual-center"></div>
      <div class="dual-fill ${fc}" style="width:${half}%"></div>
    </div>
    <span class="dual-num ${nc}">${isPos?'+':''}${val.toFixed(1)}%</span>
  </div>`
}
function volBar(val, thr) {
  const half=Math.min(val/2, 50), over=val>=thr
  return `<div class="dual-bar">
    <div class="dual-track"><div class="dual-center"></div>
      <div class="dual-fill df-vol${over?' over':''}" style="width:${half}%"></div>
    </div>
    <span class="dual-num ${over?'dn-vol-over':''}">${val.toFixed(1)}%</span>
  </div>`
}
function diaCellHtml(sym) {
  const d = diamonds[sym]
  if(!d) return `<div class="dia-cell"><span class="dia-icon dia-none">◆</span></div>`
  const ic = d.direction==='up'?'dia-up':'dia-down'
  const tc = timeClass(d.received_at)
  return `<div class="dia-cell">
    <span class="dia-icon ${ic}">◆</span>
    <span class="dia-time ${tc}">${timeAgo(d.received_at)} 전</span>
  </div>`
}
function scorePill(r) {
  const s = Math.round((Math.abs(r.cvd_pct)+Math.abs(r.oi_pct)+r.vol_pct)/3)
  const c = s>=70?'sp-hi':s>=40?'sp-md':'sp-lo'
  return `<span class="score-pill ${c}">${s}%</span>`
}
function diagClass(d) {
  const map = {
    '건강한 상승': 'dg-healthy-up', '건강한 상승 (거래량 동반)': 'dg-healthy-up',
    '숏스퀴즈': 'dg-squeeze', '숏스퀴즈 (거래량 동반)': 'dg-squeeze',
    '하락 다이버전스': 'dg-div-bear',
    '상승 다이버전스': 'dg-div-bull',
    '건강한 하락': 'dg-healthy-dn', '건강한 하락 (거래량 동반)': 'dg-healthy-dn',
    '롱청산 하락': 'dg-healthy-dn', '롱청산 하락 (거래량 동반)': 'dg-healthy-dn',
    '매집 가능성': 'dg-accum',
    '매수 소진 주의': 'dg-exhaust',
  }
  return map[d] || 'dg-weak'
}

// ── 정렬 ──────────────────────────────────
function sortRows(rows, key) {
  return [...rows].sort((a,b) => {
    if(key==='cvd') return Math.abs(b.cvd_pct)-Math.abs(a.cvd_pct)
    if(key==='vol') return b.vol_pct-a.vol_pct
    if(key==='dia') {
      const da = diamonds[a.symbol]?.received_at || ''
      const db = diamonds[b.symbol]?.received_at || ''
      return db.localeCompare(da)
    }
    return (Math.abs(b.cvd_pct)+Math.abs(b.oi_pct)+b.vol_pct) -
           (Math.abs(a.cvd_pct)+Math.abs(a.oi_pct)+a.vol_pct)
  })
}

// ── 렌더 ──────────────────────────────────
function makeRow(r, isSig, sigCls, cvdThr, oiThr, volThr) {
  const k = r.exchange+':'+r.symbol
  const sel = selKey===k ? 'selected' : ''
  const dim = !isSig ? 'dim' : ''
  const dc = diagClass(r.diagnosis||'')
  return `<tr class="${isSig?sigCls:''} ${isSig?'sig':''} ${dim} ${sel}"
    onclick="selectRow('${r.exchange}','${r.symbol}')">
    <td><span class="ticker-name">${r.symbol}</span>${exTag(r.exchange)}</td>
    <td class="c">${dualBar(r.cvd_pct||0, cvdThr)}</td>
    <td class="c">${dualBar(r.oi_pct||0, oiThr)}</td>
    <td class="c">${volBar(r.vol_pct||0, volThr)}</td>
    <td class="r">${scorePill(r)}</td>
    <td class="c">${diaCellHtml(r.symbol)}</td>
    <td><span class="diag ${dc}">${r.diagnosis||'—'}</span></td>
  </tr>`
}

function render() {
  const longs  = allData.filter(r=>r.cvd_pct>0)
  const shorts = allData.filter(r=>r.cvd_pct<0)

  // LONG 테이블
  let lr = sortRows(longs, lSort)
  if(lDiaOnly) lr = lr.filter(r=>diamonds[r.symbol])
  const lSig = lr.filter(r=>isLongSig(r))
  const lNo  = lr.filter(r=>!isLongSig(r))
  document.getElementById('long-tbody').innerHTML =
    [...lSig,...lNo].map(r=>makeRow(r,isLongSig(r),'long-sig',LP.cvd,LP.oi,LP.vol)).join('')
  document.getElementById('long-cnt').textContent = lSig.length+'개'

  // SHORT 테이블
  let sr = sortRows(shorts, sSort)
  if(sDiaOnly) sr = sr.filter(r=>diamonds[r.symbol])
  const sSig = sr.filter(r=>isShortSig(r))
  const sNo  = sr.filter(r=>!isShortSig(r))
  document.getElementById('short-tbody').innerHTML =
    [...sSig,...sNo].map(r=>makeRow(r,isShortSig(r),'short-sig',SP.cvd,SP.oi,SP.vol)).join('')
  document.getElementById('short-cnt').textContent = sSig.length+'개'
}

// ── 상세 패널 ─────────────────────────────
function selectRow(exchange, symbol) {
  selKey = exchange+':'+symbol
  const r = allData.find(x=>x.exchange===exchange&&x.symbol===symbol)
  if(!r) return
  render()

  const cvdC = r.cvd_pct>=0?'#2ecc71':'#e74c3c'
  const oiC  = r.oi_pct>=0 ?'#2ecc71':'#e74c3c'
  const pcC  = r.price_chg>=0?'#2ecc71':'#e74c3c'
  const cvdS = r.cvd_pct>=0?'+':''
  const oiS  = r.oi_pct>=0?'+':''
  const pcS  = r.price_chg>=0?'+':''
  const dc   = diagClass(r.diagnosis||'')
  const dir  = r.cvd_pct>0?'LONG':'SHORT'
  const score = Math.round((Math.abs(r.cvd_pct)+Math.abs(r.oi_pct)+r.vol_pct)/3)

  const dia = diamonds[symbol]
  let diaBox = ''
  if(dia) {
    const isUp = dia.direction==='up'
    const dc2 = isUp?'#2ecc71':'#e74c3c'
    const tc  = timeClass(dia.received_at)
    const tC  = tc==='dia-fresh'?'#f0b90b':tc==='dia-recent'?'#666':'#333'
    diaBox = `<div class="dia-detail-box ${dia.direction}">
      <div style="display:flex;justify-content:space-between;align-items:center">
        <span style="font-size:16px;color:${dc2}">◆</span>
        <div style="text-align:right">
          <div style="font-size:11px;font-weight:500;color:${dc2}">4H ${isUp?'상승':'하락'} 다이아</div>
          <div style="font-size:10px;color:${tC}">${timeAgo(dia.received_at)} 전 · $${dia.price}</div>
        </div>
      </div>
    </div>`
  } else {
    diaBox = `<div style="margin-top:5px;font-size:10px;color:#1e1e1e">4H 다이아 없음</div>`
  }

  document.getElementById('detail-panel').innerHTML = `
  <div class="detail-inner">
    <div class="detail-info">
      <div class="detail-title">${symbol}</div>
      <div class="detail-sub">${exchange.toUpperCase()} · 선물 · 15분봉</div>
      <div class="detail-score" style="color:${dir==='LONG'?'#2ecc71':'#e74c3c'}">${score}%</div>
      <div class="detail-score-label">종합 강도</div>
      <div class="drow"><span class="dlabel">가격</span><span style="font-size:11px;color:#aaa">$${r.price?.toFixed(4)||'—'}</span></div>
      <div class="drow"><span class="dlabel">변화율</span><span style="font-size:11px;color:${pcC}">${pcS}${r.price_chg?.toFixed(2)||0}%</span></div>
      <div class="drow"><span class="dlabel">CVD</span><span style="font-size:11px;color:${cvdC}">${cvdS}${r.cvd_pct?.toFixed(1)||0}%</span></div>
      <div class="drow"><span class="dlabel">OI</span><span style="font-size:11px;color:${oiC}">${oiS}${r.oi_pct?.toFixed(1)||0}%</span></div>
      <div class="drow"><span class="dlabel">거래량</span><span style="font-size:11px;color:#d5a55b">${r.vol_pct?.toFixed(1)||0}%</span></div>
      <div class="drow"><span class="dlabel">방향</span><span style="font-size:11px;color:${dir==='LONG'?'#2ecc71':'#e74c3c'}">${dir==='LONG'?'▲ LONG':'▼ SHORT'}</span></div>
      <div class="diag-detail ${dc}">${r.diagnosis||'—'}</div>
      ${diaBox}
    </div>
    <div class="charts-area">
      <div class="chart-col">
        <div class="chart-top">
          <span class="chart-name" style="color:#5b9bd5">CVD</span>
          <span class="chart-val" style="color:${cvdC}">${cvdS}${r.cvd_pct?.toFixed(1)||0}%</span>
        </div>
        <svg class="spark" viewBox="0 0 150 80" preserveAspectRatio="none">${spark(r.cvd_pct||0,'#2ecc71','#e74c3c',true)}</svg>
      </div>
      <div class="chart-col">
        <div class="chart-top">
          <span class="chart-name" style="color:#9b7fd5">OI</span>
          <span class="chart-val" style="color:${oiC}">${oiS}${r.oi_pct?.toFixed(1)||0}%</span>
        </div>
        <svg class="spark" viewBox="0 0 150 80" preserveAspectRatio="none">${spark(r.oi_pct||0,'#2ecc71','#e74c3c',true)}</svg>
      </div>
      <div class="chart-col">
        <div class="chart-top">
          <span class="chart-name" style="color:#d5a55b">거래량</span>
          <span class="chart-val" style="color:#d5a55b">${r.vol_pct?.toFixed(1)||0}%</span>
        </div>
        <svg class="spark" viewBox="0 0 150 80" preserveAspectRatio="none">${spark(r.vol_pct||0,'#d5a55b','#d5a55b',false)}</svg>
      </div>
    </div>
  </div>`
}

function spark(endVal,posColor,negColor,hasMid) {
  const pts=[]
  let v=endVal*0.5+(Math.random()-0.5)*20
  for(let i=0;i<15;i++){v+=(Math.random()-0.48)*12;v=Math.max(-98,Math.min(98,v));pts.push(v)}
  pts.push(endVal)
  const n=pts.length, toY=v=>hasMid?40-v*0.38:75-v*0.68
  const coords=pts.map((p,i)=>`${(i/(n-1)*148+1).toFixed(1)},${toY(p).toFixed(1)}`).join(' ')
  const color=endVal>=0?posColor:negColor
  const mid=hasMid?`<line x1="1" y1="40" x2="149" y2="40" stroke="#1e1e1e" stroke-width="0.5"/>`:'';
  return `${mid}<polyline points="${coords}" fill="none" stroke="${color}" stroke-width="1.5" stroke-linejoin="round" opacity="0.9"/>`
}

// ── 슬라이더 이벤트 ───────────────────────
function setLP(k,v) { LP[k]=parseInt(v); document.getElementById('lp-'+k).textContent=v+'%'; saveParams(); render(); }
function setSP(k,v) { SP[k]=parseInt(v); document.getElementById('sp-'+k).textContent=v+'%'; saveParams(); render(); }

function setSort(side, val) {
  if(side==='long') {
    lSort=val
    ['score','cvd','vol','dia'].forEach(v=>{
      document.getElementById('ls-'+v).classList.toggle('active',v===val)
    })
  } else {
    sSort=val
    ['score','cvd','vol','dia'].forEach(v=>{
      document.getElementById('ss-'+v).classList.toggle('active',v===val)
    })
  }
  render()
}

function toggleDia(side) {
  if(side==='long') {
    lDiaOnly=!lDiaOnly
    document.getElementById('ldiatog').classList.toggle('active',lDiaOnly)
  } else {
    sDiaOnly=!sDiaOnly
    document.getElementById('sdiatog').classList.toggle('active',sDiaOnly)
  }
  render()
}

// ── 초기화 ────────────────────────────────
async function init() {
  loadParams()

  // 워밍업 배너 (30분 후 숨김)
  document.getElementById('warming-banner').style.display = 'block'
  setTimeout(() => {
    document.getElementById('warming-banner').style.display = 'none'
  }, 30 * 60 * 1000)

  await Promise.all([loadLatestCandles(), loadDiamonds()])
  subscribeRealtime()

  // 15분마다 전체 새로고침 (보험용)
  setInterval(async () => {
    await Promise.all([loadLatestCandles(), loadDiamonds()])
  }, 15 * 60 * 1000)
}

init()
</script>
