<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ALTSCANNER</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --bg:     #141414;
  --bg2:    #1a1a1a;
  --bg3:    #181818;
  --border: #222;
  --border2:#1e1e1e;
  --text:   #e0e0e0;
  --text2:  #888;
  --text3:  #666;
  --text4:  #e0e0e0;
  --green:  #2ecc71;
  --red:    #e74c3c;
  --blue:   #5b9bd5;
  --purple: #9b7fd5;
  --yellow: #f0b90b;
  --orange: #d5a55b;
}
body {
  background: var(--bg);
  color: var(--text);
  font-family: 'Consolas', monospace;
  font-size: 13px;
  overflow: hidden;
  height: 100vh;
  display: flex;
  flex-direction: column;
}

/* 탑바 */
.topbar { flex-shrink: 0; display: flex; align-items: center; justify-content: space-between; padding: 8px 16px; background: var(--bg2); border-bottom: 0.5px solid #2a2a2a; }
.logo { font-size: 14px; font-weight: 500; color: #fff; letter-spacing: 0.5px; }
.topbar-right { display: flex; align-items: center; gap: 8px; }
.status-dot { width: 7px; height: 7px; border-radius: 50%; background: var(--green); display: inline-block; animation: pulse 2s infinite; }
@keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.4} }
.badge { font-size: 11px; padding: 3px 8px; border-radius: 4px; border: 0.5px solid #2a2a2a; color: var(--text2); background: #1f1f1f; }
.badge.on { color: var(--green); border-color: #1a3a2a; background: #0f2a1a; }
.last-update { font-size: 10px; color: var(--text4); }

/* 슬라이더 */
.containers { flex-shrink: 0; display: grid; grid-template-columns: 1fr 1fr; border-bottom: 0.5px solid #2a2a2a; }
.container-panel { padding: 7px 14px; }
.long-panel  { background: #0d1a10; border-right: 0.5px solid #2a2a2a; }
.short-panel { background: #1a0d0d; }
.container-title { font-size: 11px; font-weight: 500; margin-bottom: 5px; display: flex; align-items: center; justify-content: space-between; }
.long-panel  .container-title { color: var(--green); }
.short-panel .container-title { color: var(--red); }
.sig-count { font-size: 11px; font-weight: 500; padding: 1px 7px; border-radius: 8px; }
.long-cnt  { background: #0d2a14; color: var(--green); border: 0.5px solid #1a4a2a; }
.short-cnt { background: #2a0d0d; color: var(--red);   border: 0.5px solid #4a1a1a; }
.slider-row { display: flex; align-items: center; gap: 8px; margin-bottom: 3px; }
.slider-label { font-size: 10px; width: 28px; }
.long-panel  .slider-label { color: #2a6a3a; }
.short-panel .slider-label { color: #6a2a2a; }
.slider-wrap { flex: 1; }
.slider-wrap input[type=range] { width: 100%; accent-color: #444; }
.slider-val { font-size: 11px; font-weight: 500; min-width: 32px; text-align: right; }
.long-panel  .slider-val { color: var(--green); }
.short-panel .slider-val { color: var(--red); }

/* 정렬 바 */
.sort-bar { flex-shrink: 0; display: grid; grid-template-columns: 1fr 1fr; border-bottom: 0.5px solid var(--border); }
.sort-section { display: flex; align-items: center; gap: 4px; padding: 5px 14px; }
.sort-section:first-child { border-right: 0.5px solid var(--border); }
.sort-label { font-size: 10px; color: var(--text4); margin-right: 2px; }
.sb { font-size: 10px; padding: 3px 8px; border: none; border-left: 2px solid transparent; background: transparent; color: var(--text4); cursor: pointer; font-family: inherit; }
.sb:hover { color: var(--text3); }
.sb.active { border-left-color: var(--blue); color: #a8d0f0; }

/* 메인 영역 - 남은 공간 차지 */
.main-area { flex: 1; display: flex; flex-direction: column; overflow: hidden; }

/* 테이블 */
.main-split { display: grid; grid-template-columns: 1fr 1fr; flex: 1; overflow: hidden; }
.table-pane { display: flex; flex-direction: column; overflow: hidden; }
.long-pane  { border-right: 0.5px solid var(--border); }
.pane-header { flex-shrink: 0; padding: 5px 14px; background: var(--bg3); border-bottom: 0.5px solid var(--border2); }
.pane-title { font-size: 10px; font-weight: 500; }
.long-pane  .pane-title { color: var(--green); }
.short-pane .pane-title { color: var(--red); }
.table-scroll { flex: 1; overflow-y: auto; }
.table-scroll::-webkit-scrollbar { width: 4px; }
.table-scroll::-webkit-scrollbar-track { background: var(--bg); }
.table-scroll::-webkit-scrollbar-thumb { background: #333; border-radius: 2px; }

table { width: 100%; border-collapse: collapse; table-layout: fixed; }
thead { position: sticky; top: 0; z-index: 10; background: var(--bg2); }
th { padding: 5px 8px; text-align: left; font-size: 10px; color: var(--text4); font-weight: 400; border-bottom: 0.5px solid var(--border2); white-space: nowrap; }
th.r { text-align: right; }
th.c { text-align: center; }
td { padding: 4px 8px; font-size: 11px; border-bottom: 0.5px solid #181818; vertical-align: middle; color: #777; }
td.r { text-align: right; }
td.c { text-align: center; }
tr { cursor: pointer; transition: background 0.1s; }
tr:hover td { background: #1c1c1c; }
tr.selected td { background: #1a2030; }
tr.sig td { color: #aaa; }
tr.sig .ticker-name { color: #ddd; }
tr.long-sig { border-left: 2px solid var(--green); }
tr.short-sig { border-left: 2px solid var(--red); }
tr.dim { opacity: 0.2; }

.ticker-name { font-size: 11px; font-weight: 500; color: #aaa; }
.ex-tag { font-size: 9px; padding: 1px 4px; border-radius: 2px; margin-left: 3px; }
.ex-bnc { background: #1a1a08; color: #6a5010; border: 0.5px solid #2a2a10; }
.ex-okx { background: #1e1e1e; color: #555;    border: 0.5px solid #2a2a2a; }
.ex-byb { background: #0a1020; color: #5a5010; border: 0.5px solid #1a2030; }
tr.sig .ex-bnc { color: var(--yellow); }
tr.sig .ex-okx { color: #aaa; }
tr.sig .ex-byb { color: #f7a600; }

/* 바 */
.dual-bar { display: flex; align-items: center; gap: 3px; justify-content: center; }
.dual-track { width: 50px; height: 4px; background: #1a1a1a; border-radius: 2px; position: relative; overflow: hidden; }
.dual-center { position: absolute; left: 50%; top: 0; width: 0.5px; height: 100%; background: #252525; }
.dual-fill { position: absolute; top: 0; height: 100%; }
.df-pos      { left:  50%; background: #1a3a1a; border-radius: 0 2px 2px 0; }
.df-neg      { right: 50%; background: #3a1a1a; border-radius: 2px 0 0 2px; }
.df-vol      { left:  50%; background: #2a2510; border-radius: 0 2px 2px 0; }
.df-pos.over { background: var(--green); }
.df-neg.over { background: var(--red); }
.df-vol.over { background: var(--orange); }
.dual-num { font-size: 10px; min-width: 30px; text-align: right; color: var(--text4); }
.dn-pos-over { color: var(--green);  font-weight: 500; }
.dn-neg-over { color: var(--red);    font-weight: 500; }
.dn-vol-over { color: var(--orange); font-weight: 500; }

/* 진단 */
.diag { font-size: 9px; padding: 1px 5px; border-radius: 3px; white-space: nowrap; display: inline-block; }
.dg-healthy-up { background: #0a1f0a; color: var(--green);  border: 0.5px solid #1a3a1a; }
.dg-squeeze    { background: #0a1520; color: var(--blue);   border: 0.5px solid #1a2a3a; }
.dg-div-bear   { background: #1f1f0a; color: var(--yellow); border: 0.5px solid #3a3a1a; }
.dg-div-bull   { background: #1a0a1f; color: var(--purple); border: 0.5px solid #2a1a3a; }
.dg-healthy-dn { background: #1f0a0a; color: var(--red);    border: 0.5px solid #3a1a1a; }
.dg-exhaust    { background: #1a1210; color: var(--orange); border: 0.5px solid #3a2a1a; }
.dg-accum      { background: #0a1a1f; color: #5bd5c8;       border: 0.5px solid #1a3a3a; }
.dg-weak       { background: #181818; color: var(--text3);  border: 0.5px solid var(--border); }

.score-pill { font-size: 10px; font-weight: 500; padding: 1px 5px; border-radius: 6px; display: inline-block; }
.sp-hi { background: #0f2a1a; color: var(--green);  border: 0.5px solid #1a4a2a; }
.sp-md { background: #1a1a08; color: var(--yellow); border: 0.5px solid #2a2a10; }
.sp-lo { background: #161616; color: var(--text4);  border: 0.5px solid var(--border2); }

/* 상세 패널 */
.detail-section { flex-shrink: 0; height: 200px; border-top: 0.5px solid var(--border); background: var(--bg3); display: flex; }
.detail-info { width: 170px; padding: 10px 14px; border-right: 0.5px solid var(--border2); flex-shrink: 0; display: flex; flex-direction: column; gap: 4px; overflow: hidden; }
.detail-title { font-size: 12px; font-weight: 500; color: #fff; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.detail-sub { font-size: 10px; color: var(--text4); }
.detail-score { font-size: 24px; font-weight: 500; line-height: 1.1; }
.drow { display: flex; justify-content: space-between; align-items: center; }
.dlabel { font-size: 10px; color: var(--text4); }
.diag-detail { padding: 2px 6px; border-radius: 3px; font-size: 9px; }

/* 차트 */
.charts-area { flex: 1; display: flex; overflow: hidden; }
.chart-col { flex: 1; border-right: 0.5px solid #1a1a1a; padding: 8px 10px; display: flex; flex-direction: column; overflow: hidden; }
.chart-col:last-child { border-right: none; }
.chart-top { display: flex; justify-content: space-between; margin-bottom: 4px; flex-shrink: 0; }
.chart-name { font-size: 10px; }
.chart-val  { font-size: 10px; font-weight: 500; }
.spark-wrap { flex: 1; position: relative; min-height: 0; }
.spark { position: absolute; top: 0; left: 0; width: 100%; height: 100%; }

.empty-detail { flex: 1; display: flex; align-items: center; justify-content: center; color: var(--text4); font-size: 12px; }
</style>
</head>
<body>

<div class="topbar">
  <div style="display:flex;align-items:center;gap:10px">
    <span class="logo">ALTSCANNER</span>
    <span class="status-dot"></span>
    <span style="font-size:11px;color:#444" id="status-text">연결 중...</span>
  </div>
  <div class="topbar-right">
    <span class="badge on" id="badge-bnc">BNC —</span>
    <span class="badge on" id="badge-okx">OKX —</span>
    <span class="badge on" id="badge-byb">BYB —</span>
    <span class="badge">15분봉</span>
    <span class="last-update" id="last-update"></span>
  </div>
</div>

<div class="containers">
  <div class="container-panel long-panel">
    <div class="container-title">
      <span>▲ 상승 신호 기준</span>
      <span class="sig-count long-cnt" id="long-cnt">0개</span>
    </div>
    <div class="slider-row">
      <span class="slider-label">CVD</span>
      <div class="slider-wrap"><input type="range" min="0" max="100" step="5" value="60" oninput="setLP('cvd',this.value)"></div>
      <span class="slider-val" id="lp-cvd">60%</span>
    </div>
    <div class="slider-row">
      <span class="slider-label">OI</span>
      <div class="slider-wrap"><input type="range" min="0" max="100" step="5" value="50" oninput="setLP('oi',this.value)"></div>
      <span class="slider-val" id="lp-oi">50%</span>
    </div>
    <div class="slider-row">
      <span class="slider-label">VOL</span>
      <div class="slider-wrap"><input type="range" min="0" max="100" step="5" value="70" oninput="setLP('vol',this.value)"></div>
      <span class="slider-val" id="lp-vol">70%</span>
    </div>
  </div>
  <div class="container-panel short-panel">
    <div class="container-title">
      <span>▼ 하락 신호 기준</span>
      <span class="sig-count short-cnt" id="short-cnt">0개</span>
    </div>
    <div class="slider-row">
      <span class="slider-label">CVD</span>
      <div class="slider-wrap"><input type="range" min="0" max="100" step="5" value="60" oninput="setSP('cvd',this.value)"></div>
      <span class="slider-val" id="sp-cvd">60%</span>
    </div>
    <div class="slider-row">
      <span class="slider-label">OI</span>
      <div class="slider-wrap"><input type="range" min="0" max="100" step="5" value="50" oninput="setSP('oi',this.value)"></div>
      <span class="slider-val" id="sp-oi">50%</span>
    </div>
    <div class="slider-row">
      <span class="slider-label">VOL</span>
      <div class="slider-wrap"><input type="range" min="0" max="100" step="5" value="70" oninput="setSP('vol',this.value)"></div>
      <span class="slider-val" id="sp-vol">70%</span>
    </div>
  </div>
</div>

<div class="sort-bar">
  <div class="sort-section">
    <span class="sort-label">정렬</span>
    <button class="sb active" id="ls-score" onclick="setSort('long','score')">종합</button>
    <button class="sb" id="ls-cvd" onclick="setSort('long','cvd')">CVD</button>
    <button class="sb" id="ls-oi" onclick="setSort('long','oi')">OI</button>
    <button class="sb" id="ls-vol" onclick="setSort('long','vol')">거래량</button>
  </div>
  <div class="sort-section">
    <span class="sort-label">정렬</span>
    <button class="sb active" id="ss-score" onclick="setSort('short','score')">종합</button>
    <button class="sb" id="ss-cvd" onclick="setSort('short','cvd')">CVD</button>
    <button class="sb" id="ss-oi" onclick="setSort('short','oi')">OI</button>
    <button class="sb" id="ss-vol" onclick="setSort('short','vol')">거래량</button>
  </div>
</div>

<div class="main-area">
  <div class="main-split">
    <div class="table-pane long-pane">
      <div class="pane-header"><span class="pane-title">▲ LONG</span></div>
      <div class="table-scroll">
        <table>
          <thead><tr>
            <th style="width:110px">티커</th>
            <th style="width:82px" class="c">CVD</th>
            <th style="width:82px" class="c">OI</th>
            <th style="width:82px" class="c">거래량</th>
            <th style="width:48px" class="r">종합</th>
            <th>상태 진단</th>
          </tr></thead>
          <tbody id="long-tbody"></tbody>
        </table>
      </div>
    </div>
    <div class="table-pane short-pane">
      <div class="pane-header"><span class="pane-title">▼ SHORT</span></div>
      <div class="table-scroll">
        <table>
          <thead><tr>
            <th style="width:110px">티커</th>
            <th style="width:82px" class="c">CVD</th>
            <th style="width:82px" class="c">OI</th>
            <th style="width:82px" class="c">거래량</th>
            <th style="width:48px" class="r">종합</th>
            <th>상태 진단</th>
          </tr></thead>
          <tbody id="short-tbody"></tbody>
        </table>
      </div>
    </div>
  </div>

  <div class="detail-section" id="detail-section">
    <div class="empty-detail" id="empty-detail">티커를 클릭하면 상세 정보가 표시됩니다</div>
    <div class="detail-info" id="detail-info" style="display:none"></div>
    <div class="charts-area" id="charts-area" style="display:none">
      <div class="chart-col">
        <div class="chart-top">
          <span class="chart-name" style="color:#5b9bd5">CVD</span>
          <span class="chart-val" id="cvd-val"></span>
        </div>
        <div class="spark-wrap">
          <svg class="spark" id="spark-cvd" viewBox="0 0 200 100" preserveAspectRatio="none"></svg>
        </div>
      </div>
      <div class="chart-col">
        <div class="chart-top">
          <span class="chart-name" style="color:#9b7fd5">OI</span>
          <span class="chart-val" id="oi-val"></span>
        </div>
        <div class="spark-wrap">
          <svg class="spark" id="spark-oi" viewBox="0 0 200 100" preserveAspectRatio="none"></svg>
        </div>
      </div>
      <div class="chart-col">
        <div class="chart-top">
          <span class="chart-name" style="color:#d5a55b">거래량</span>
          <span class="chart-val" id="vol-val"></span>
        </div>
        <div class="spark-wrap">
          <svg class="spark" id="spark-vol" viewBox="0 0 200 100" preserveAspectRatio="none"></svg>
        </div>
      </div>
    </div>
  </div>
</div>

<script>
const SUPABASE_URL = 'https://qjhqilkjckqpjlojppgq.supabase.co'
const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InFqaHFpbGtqY2txcGpsb2pwcGdxIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzcwNTkwNzEsImV4cCI6MjA5MjYzNTA3MX0.AgjvFhkvjvPLRi282m1lQ-mL5-2Yzpq88aQNb8hMxG4'
const { createClient } = supabase
const sb = createClient(SUPABASE_URL, SUPABASE_KEY)

let LP = { cvd:60, oi:50, vol:70 }
let SP = { cvd:60, oi:50, vol:70 }
let lSort = 'score', sSort = 'score'
let selKey = null
let allData = []

function loadParams() {
  try {
    const saved = JSON.parse(localStorage.getItem('altscanner_params') || '{}')
    if(saved.LP) LP = saved.LP
    if(saved.SP) SP = saved.SP
    const lS = document.querySelectorAll('.long-panel input[type=range]')
    const sS = document.querySelectorAll('.short-panel input[type=range]')
    lS[0].value=LP.cvd; lS[1].value=LP.oi; lS[2].value=LP.vol
    sS[0].value=SP.cvd; sS[1].value=SP.oi; sS[2].value=SP.vol
    document.getElementById('lp-cvd').textContent=LP.cvd+'%'
    document.getElementById('lp-oi').textContent=LP.oi+'%'
    document.getElementById('lp-vol').textContent=LP.vol+'%'
    document.getElementById('sp-cvd').textContent=SP.cvd+'%'
    document.getElementById('sp-oi').textContent=SP.oi+'%'
    document.getElementById('sp-vol').textContent=SP.vol+'%'
  } catch(e) {}
}
function saveParams() {
  localStorage.setItem('altscanner_params', JSON.stringify({LP, SP}))
}

async function loadLatestCandles() {
  const { data, error } = await sb.from('candle_data').select('*').order('ts',{ascending:false}).limit(1000)
  if(error) { console.error(error); return; }
  const latest = {}
  for(const row of data) {
    const key = row.exchange+':'+row.symbol
    if(!latest[key]) latest[key] = row
  }
  allData = Object.values(latest)
  updateBadges()
  render()
}

function updateBadges() {
  document.getElementById('badge-bnc').textContent = `BNC ${allData.filter(r=>r.exchange==='binance').length}`
  document.getElementById('badge-okx').textContent = `OKX ${allData.filter(r=>r.exchange==='okx').length}`
  document.getElementById('badge-byb').textContent = `BYB ${allData.filter(r=>r.exchange==='bybit').length}`
  document.getElementById('last-update').textContent = '업데이트: '+new Date().toLocaleTimeString('ko-KR')
  document.getElementById('status-text').textContent = '실시간 수집 중'
}

function subscribeRealtime() {
  sb.channel('candle_rt')
    .on('postgres_changes',{event:'INSERT',schema:'public',table:'candle_data'}, payload => {
      const row = payload.new
      allData = allData.filter(r=>!(r.exchange===row.exchange&&r.symbol===row.symbol))
      allData.push(row)
      updateBadges()
      render()
      if(selKey === row.exchange+':'+row.symbol) selectRow(row.exchange, row.symbol)
    }).subscribe()
}

function isLongSig(r) { return r.cvd_pct>=LP.cvd && r.oi_pct>=LP.oi && r.vol_pct>=LP.vol }
function isShortSig(r) { return r.cvd_pct<=-SP.cvd && r.oi_pct<=-SP.oi && r.vol_pct>=SP.vol }

function exTag(ex) {
  const map={binance:'BNC',okx:'OKX',bybit:'BYB'}
  const cls=ex==='binance'?'ex-bnc':ex==='okx'?'ex-okx':'ex-byb'
  return `<span class="ex-tag ${cls}">${map[ex]||ex}</span>`
}

function dualBar(val, thr) {
  const abs=Math.abs(val), half=Math.min(abs/2,50)
  const isPos=val>=0, over=abs>=thr
  const fc=(isPos?'df-pos':'df-neg')+(over?' over':'')
  const nc=isPos?(over?'dn-pos-over':''):(over?'dn-neg-over':'')
  return `<div class="dual-bar"><div class="dual-track"><div class="dual-center"></div><div class="dual-fill ${fc}" style="width:${half}%"></div></div><span class="dual-num ${nc}">${isPos?'+':''}${val.toFixed(1)}%</span></div>`
}

function volBar(val, thr) {
  const half=Math.min(val/2,50), over=val>=thr
  return `<div class="dual-bar"><div class="dual-track"><div class="dual-center"></div><div class="dual-fill df-vol${over?' over':''}" style="width:${half}%"></div></div><span class="dual-num ${over?'dn-vol-over':''}">${val.toFixed(1)}%</span></div>`
}

function scorePill(r) {
  const s=Math.round((Math.abs(r.cvd_pct)+Math.abs(r.oi_pct)+r.vol_pct)/3)
  return `<span class="score-pill ${s>=70?'sp-hi':s>=40?'sp-md':'sp-lo'}">${s}%</span>`
}

function diagClass(d) {
  const map={
    '건강한 상승':'dg-healthy-up','건강한 상승 (거래량 동반)':'dg-healthy-up',
    '숏스퀴즈':'dg-squeeze','숏스퀴즈 (거래량 동반)':'dg-squeeze',
    '하락 다이버전스':'dg-div-bear','상승 다이버전스':'dg-div-bull',
    '건강한 하락':'dg-healthy-dn','건강한 하락 (거래량 동반)':'dg-healthy-dn',
    '롱청산 하락':'dg-healthy-dn','롱청산 하락 (거래량 동반)':'dg-healthy-dn',
    '매집 가능성':'dg-accum','매수 소진 주의':'dg-exhaust',
  }
  return map[d]||'dg-weak'
}

function sortRows(rows, key) {
  return [...rows].sort((a,b)=>{
    if(key==='cvd') return Math.abs(b.cvd_pct)-Math.abs(a.cvd_pct)
    if(key==='oi')  return Math.abs(b.oi_pct)-Math.abs(a.oi_pct)
    if(key==='vol') return b.vol_pct-a.vol_pct
    return (Math.abs(b.cvd_pct)+Math.abs(b.oi_pct)+b.vol_pct)-(Math.abs(a.cvd_pct)+Math.abs(a.oi_pct)+a.vol_pct)
  })
}

function makeRow(r, isSig, sigCls, cvdThr, oiThr, volThr) {
  const k=r.exchange+':'+r.symbol
  const sel=selKey===k?'selected':'', dim=!isSig?'dim':'', dc=diagClass(r.diagnosis||'')
  return `<tr class="${isSig?sigCls:''} ${isSig?'sig':''} ${dim} ${sel}" onclick="selectRow('${r.exchange}','${r.symbol}')">
    <td><span class="ticker-name">${r.symbol}</span>${exTag(r.exchange)}</td>
    <td class="c">${dualBar(r.cvd_pct||0,cvdThr)}</td>
    <td class="c">${dualBar(r.oi_pct||0,oiThr)}</td>
    <td class="c">${volBar(r.vol_pct||0,volThr)}</td>
    <td class="r">${scorePill(r)}</td>
    <td><span class="diag ${dc}">${r.diagnosis||'—'}</span></td>
  </tr>`
}

function render() {
  const longs=allData.filter(r=>r.cvd_pct>0)
  const shorts=allData.filter(r=>r.cvd_pct<0)
  const lr=sortRows(longs,lSort)
  const lSig=lr.filter(r=>isLongSig(r)), lNo=lr.filter(r=>!isLongSig(r))
  document.getElementById('long-tbody').innerHTML=[...lSig,...lNo].map(r=>makeRow(r,isLongSig(r),'long-sig',LP.cvd,LP.oi,LP.vol)).join('')
  document.getElementById('long-cnt').textContent=lSig.length+'개'
  const sr=sortRows(shorts,sSort)
  const sSig=sr.filter(r=>isShortSig(r)), sNo=sr.filter(r=>!isShortSig(r))
  document.getElementById('short-tbody').innerHTML=[...sSig,...sNo].map(r=>makeRow(r,isShortSig(r),'short-sig',SP.cvd,SP.oi,SP.vol)).join('')
  document.getElementById('short-cnt').textContent=sSig.length+'개'
}

// 스파크라인 - 중앙(50) 기준, 양수 위 음수 아래
function drawSpark(svgId, value, color) {
  const svg = document.getElementById(svgId)
  if(!svg) return
  const pts = []
  let v = value
  for(let i=14;i>=0;i--) {
    pts.unshift(v)
    v = Math.max(0, Math.min(100, v - (Math.random()-0.5)*18))  // 12 → 18
  }
  const toY = val => 88 - val * 0.76  // 범위 조정 (5~88)
  const w = 200, n = pts.length
  const coords = pts.map((p,i)=>`${(i/(n-1)*(w-4)+2).toFixed(1)},${Math.max(8,Math.min(88,toY(p))).toFixed(1)}`).join(' ')
  svg.innerHTML = `
    <polyline points="${coords}" fill="none" stroke="${color}" stroke-width="1.5" stroke-linejoin="round" opacity="0.9"/>
    <circle cx="${(w-2).toFixed(1)}" cy="${Math.max(8,Math.min(88,toY(value))).toFixed(1)}" r="2" fill="${color}"/>
  `
}

async function selectRow(exchange, symbol) {
  selKey = exchange+':'+symbol
  const r = allData.find(x=>x.exchange===exchange&&x.symbol===symbol)
  if(!r) return
  render()

  const cvdC = r.cvd_pct>=0?'#2ecc71':'#e74c3c'
  const oiC  = r.oi_pct>=0 ?'#2ecc71':'#e74c3c'
  const pcC  = r.price_chg>=0?'#2ecc71':'#e74c3c'
  const dir  = r.cvd_pct>0?'LONG':'SHORT'
  const dc   = diagClass(r.diagnosis||'')
  const score = Math.round((Math.abs(r.cvd_pct)+Math.abs(r.oi_pct)+r.vol_pct)/3)

  document.getElementById('empty-detail').style.display = 'none'
  document.getElementById('detail-info').style.display = 'flex'
  document.getElementById('charts-area').style.display = 'flex'

  document.getElementById('detail-info').innerHTML = `
    <div>
      <div class="detail-title">${symbol}</div>
      <div class="detail-sub">${exchange.toUpperCase()} · 15분봉</div>
    </div>
    <div class="detail-score" style="color:${dir==='LONG'?'#2ecc71':'#e74c3c'}">${score}%</div>
    <div class="drow"><span class="dlabel">가격</span><span style="font-size:11px;color:#aaa">$${r.price?.toFixed(4)||'—'}</span></div>
    <div class="drow"><span class="dlabel">변화율</span><span style="font-size:11px;color:${pcC}">${r.price_chg>=0?'+':''}${r.price_chg?.toFixed(2)||0}%</span></div>
    <div class="drow"><span class="dlabel">CVD</span><span style="font-size:11px;color:${cvdC}">${r.cvd_pct>=0?'+':''}${r.cvd_pct?.toFixed(1)||0}%</span></div>
    <div class="drow"><span class="dlabel">OI</span><span style="font-size:11px;color:${oiC}">${r.oi_pct>=0?'+':''}${r.oi_pct?.toFixed(1)||0}%</span></div>
    <div class="drow"><span class="dlabel">거래량</span><span style="font-size:11px;color:#d5a55b">${r.vol_pct?.toFixed(1)||0}%</span></div>
    <div class="drow"><span class="dlabel">방향</span><span style="font-size:11px;color:${dir==='LONG'?'#2ecc71':'#e74c3c'}">${dir==='LONG'?'▲ LONG':'▼ SHORT'}</span></div>
    <div class="diag-detail ${dc}">${r.diagnosis||'—'}</div>
  `

  document.getElementById('cvd-val').textContent = (r.cvd_pct>=0?'+':'')+r.cvd_pct?.toFixed(1)+'%'
  document.getElementById('cvd-val').style.color = cvdC
  document.getElementById('oi-val').textContent  = (r.oi_pct>=0?'+':'')+r.oi_pct?.toFixed(1)+'%'
  document.getElementById('oi-val').style.color  = oiC
  document.getElementById('vol-val').textContent = r.vol_pct?.toFixed(1)+'%'
  document.getElementById('vol-val').style.color = '#d5a55b'

  // 히스토리 조회
  const { data: hist } = await sb
    .from('candle_data')
    .select('cvd_pct, oi_pct, vol_pct')
    .eq('exchange', exchange)
    .eq('symbol', symbol)
    .order('ts', { ascending: true })
    .limit(20)

  if(hist && hist.length > 0) {
    drawSparkReal('spark-cvd', hist.map(h => h.cvd_pct||0), cvdC)
    drawSparkReal('spark-oi',  hist.map(h => h.oi_pct||0),  oiC)
    drawSparkReal('spark-vol', hist.map(h => h.vol_pct||0), '#d5a55b')
  } else {
    drawSpark('spark-cvd', r.cvd_pct||0, cvdC)
    drawSpark('spark-oi',  r.oi_pct||0,  oiC)
    drawSpark('spark-vol', r.vol_pct||0, '#d5a55b')
  }
}

function drawSparkReal(svgId, values, color) {
  const svg = document.getElementById(svgId)
  if(!svg || values.length === 0) return
  const w = 200
  const min = Math.min(...values)
  const max = Math.max(...values)
  const range = max - min || 1
  // 5~88 범위로 정규화
  const toY = val => 88 - ((val - min) / range) * 80
  const n = values.length
  const coords = values.map((v,i) =>
    `${(i/(n-1)*(w-4)+2).toFixed(1)},${toY(v).toFixed(1)}`
  ).join(' ')
  const lastY = toY(values[n-1]).toFixed(1)
  svg.innerHTML = `
    <polyline points="${coords}" fill="none" stroke="${color}" stroke-width="1.5" stroke-linejoin="round" opacity="0.9"/>
    <circle cx="${(w-2).toFixed(1)}" cy="${lastY}" r="2" fill="${color}"/>
  `
}

function setLP(k,v) { LP[k]=parseInt(v); document.getElementById('lp-'+k).textContent=v+'%'; saveParams(); render(); }
function setSP(k,v) { SP[k]=parseInt(v); document.getElementById('sp-'+k).textContent=v+'%'; saveParams(); render(); }

function setSort(side, val) {
  if(side==='long') {
    lSort=val
    document.querySelectorAll('[id^="ls-"]').forEach(el=>el.classList.remove('active'))
    document.getElementById('ls-'+val)?.classList.add('active')
  } else {
    sSort=val
    document.querySelectorAll('[id^="ss-"]').forEach(el=>el.classList.remove('active'))
    document.getElementById('ss-'+val)?.classList.add('active')
  }
  render()
}

async function init() {
  loadParams()
  await loadLatestCandles()
  subscribeRealtime()
  setInterval(loadLatestCandles, 15*60*1000)
}
init()
</script>
