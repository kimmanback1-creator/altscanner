services:
  - type: worker
    name: altscanner
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: python main.py
    plan: standard
    envVars:
      - key: TZ
        value: Asia/Seoul
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_KEY
        sync: false
      - key: TELEGRAM_TOKEN
        sync: false
      - key: TELEGRAM_CHAT_ID
        sync: false
      - key: WEBHOOK_SECRET
        sync: false
      - key: WEBHOOK_PORT
        value: "8000"

  - type: cron
    name: altscanner-daily-report
    runtime: python
    plan: standard
    schedule: "0 0 * * *"  # UTC 00:00 = KST 09:00
    buildCommand: pip install -r requirements.txt
    startCommand: python -m notify.daily_report
    envVars:
      - key: TZ
        value: Asia/Seoul
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_KEY
        sync: false
      - key: TELEGRAM_TOKEN
        sync: false
      - key: TELEGRAM_CHAT_ID
        sync: false
